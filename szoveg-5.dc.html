<meta name="design_doc_mode" content="canvas">

<style>
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0}
  a{color:#7A1416}
  a:hover{color:#5A1012}
  .z-navlink{transition:opacity var(--dur) var(--ease)}
  .z-navlink:hover{opacity:1!important}
  .z-navlink[aria-current]{opacity:1!important;border-bottom:2px solid currentColor;padding-bottom:3px}
  @media(max-width:820px){ .z-navlinks{gap:16px!important} .z-navlink{font-size:11px!important;letter-spacing:.1em!important} }
  .z-card{transition:transform var(--dur) var(--ease)}
  .z-card:hover{transform:translateY(-3px)}
  ::selection{background:#7A1416;color:#EDE7DB}
  @media(max-width:920px){ .z-writings{grid-template-columns:1fr!important} }
</style>
</helmet>

    <a class="z-navlink" href="kurzusok.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Kurzusok</a>
    <a class="z-navlink" href="hirlevel.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Hírlevél</a>
    <a class="z-navlink" href="kapcsolat.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Kapcsolat</a>
      <div style="display:flex; align-items:center; gap:16px; margin-left:8px">

  <section style="position:relative; background-color:var(--z-slate); background-image:url(assets/zsofi/grain.png); background-size:240px; padding:88px 44px 64px">

    <div style="max-width:760px; margin:0 auto">
        <img data-detail-img="" src="assets/zsofi/z-swan-4-crop.webp" alt="" style="float:right; width:300px; aspect-ratio:203/282; object-fit:cover; margin:6px 0 20px 32px; display:block">
        <p style="font-family:var(--font-serif); font-size:20px; line-height:1.85; color:var(--z-ink); margin:0 0 24px; white-space:pre-wrap">Az alagútból már kint vagyok, és stabil léptekkel haladok tovább.</p>
        <p style="font-family:var(--font-serif); font-size:20px; line-height:1.85; color:var(--z-ink); margin:0 0 24px; white-space:pre-wrap">[Ide kerül a teljes szöveg.]</p>
      <div style="clear:both; margin-top:48px; padding-top:28px; border-top:1px solid rgba(42,35,32,.18)">
        <a href="szovegek.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--z-red); text-decoration:none">← Összes szöveg</a>
      </div>
    </div>
  </section>

  <dc-import name="Footer" hint-size="100%,320px"></dc-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 1100 },
  &quot;colorRed&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;options&quot;: [&quot;#7A1416&quot;, &quot;#AD4B34&quot;, &quot;#355061&quot;, &quot;#49616F&quot;], &quot;default&quot;: &quot;#7A1416&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Színek&quot; },
  &quot;colorTerra&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;options&quot;: [&quot;#AD4B34&quot;, &quot;#7A1416&quot;, &quot;#B5652B&quot;, &quot;#355061&quot;], &quot;default&quot;: &quot;#AD4B34&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Színek&quot; },
  &quot;colorNavy&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;options&quot;: [&quot;#355061&quot;, &quot;#49616F&quot;, &quot;#2E3A44&quot;, &quot;#7A1416&quot;], &quot;default&quot;: &quot;#355061&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Színek&quot; },
  &quot;colorSlate&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;options&quot;: [&quot;#49616F&quot;, &quot;#355061&quot;, &quot;#5A6E5A&quot;, &quot;#AD4B34&quot;], &quot;default&quot;: &quot;#49616F&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Színek&quot; },
  &quot;colorPaper&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;options&quot;: [&quot;#E2DDD1&quot;, &quot;#EDE7DB&quot;, &quot;#D5CFC0&quot;, &quot;#DED4C0&quot;], &quot;default&quot;: &quot;#E2DDD1&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Színek&quot; }
}">
class Component extends DCLogic {
  constructor(props) { super(props); this.rootRef = React.createRef(); }
  palette() {
    return {
      red: this.props.colorRed || "#7A1416",
      terra: this.props.colorTerra || "#AD4B34",
      navy: this.props.colorNavy || "#355061",
      slate: this.props.colorSlate || "#49616F",
      paper: this.props.colorPaper || "#E2DDD1",
    };
  }
  applyVars() {
    const el = this.rootRef.current; if (!el) return;
    const p = this.palette();
    el.style.setProperty("--z-red", p.red);
    el.style.setProperty("--z-terra", p.terra);
    el.style.setProperty("--z-navy", p.navy);
    el.style.setProperty("--z-slate", p.slate);
    el.style.setProperty("--z-paper", p.paper);
    el.style.setProperty("--z-hero", p.red);
  }
  componentDidMount() { this.applyVars(); }
  componentDidUpdate() { this.applyVars(); }
  renderVals() { return { rootRef: this.rootRef }; }
}
</script>
</body>
