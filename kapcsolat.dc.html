<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="design_doc_mode" content="canvas">
<link rel="stylesheet" href="styles.css">
<style>
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0}
  a{color:#7A1416}
  a:hover{color:#5A1012}
  .z-navlink{transition:opacity var(--dur) var(--ease)}
  .z-navlink:hover{opacity:1!important}
  .z-navlink[aria-current]{opacity:1!important;border-bottom:2px solid currentColor;padding-bottom:3px}
  @media(max-width:820px){ .z-navlinks{gap:16px!important} .z-navlink{font-size:11px!important;letter-spacing:.1em!important} }
  .z-btn-light:hover{background:#fff!important}
  .z-link:hover{opacity:1!important}
  ::selection{background:#7A1416;color:#EDE7DB}
  input::placeholder,textarea::placeholder{color:rgba(237,231,219,.5)}
  .z-form input::placeholder,.z-form textarea::placeholder{color:rgba(42,35,32,.45)}
  @media(max-width:920px){ .z-contact{grid-template-columns:1fr!important} }
</style>
</helmet>

<div ref="{{ rootRef }}" style="--z-red:#7A1416; --z-red-deep:#5A1012; --z-terra:#AD4B34; --z-navy:#355061; --z-slate:#49616F; --z-paper:#E2DDD1; --z-paper-2:#D5CFC0; --z-ink:#2A2320; --z-light:#EDE7DB; --z-hero:#7A1416; background:var(--z-paper); color:#2A2320; font-family:var(--font-mono); min-height:100vh; position:relative; overflow-x:hidden">

  <header style="position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; gap:20px; padding:20px 44px; background-color:var(--z-red); background-image:url(assets/zsofi/grain.png); background-size:220px; border-bottom:2px solid var(--z-red-deep)">
    <a href="index.html" style="font-family:var(--font-mono); font-weight:600; text-transform:uppercase; letter-spacing:.2em; font-size:15px; color:var(--z-light); text-decoration:none; white-space:nowrap">Mózes Zsófi</a>
    <nav class="z-navlinks" style="display:flex; align-items:center; gap:28px; flex-wrap:wrap; justify-content:flex-end">
    <a class="z-navlink" href="rolam.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Rólam</a>
    <a class="z-navlink" href="szovegek.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Szövegek</a>
    <a class="z-navlink" href="kurzusok.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Kurzusok</a>
    <a class="z-navlink" href="hirlevel.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Hírlevél</a>
    <a class="z-navlink" aria-current="page" href="kapcsolat.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Kapcsolat</a>
      <div style="display:flex; align-items:center; gap:16px; margin-left:8px">
        <a class="z-navlink" href="https://www.instagram.com/mozeszsofi/" target="_blank" rel="noopener" aria-label="Instagram" style="display:flex; align-items:center; color:var(--z-light); opacity:.82; text-decoration:none"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17.5" cy="6.5" r="1.3" fill="currentColor" stroke="none"></circle></svg></a>
        <a class="z-navlink" href="https://www.facebook.com/mozeszsofi/" target="_blank" rel="noopener" aria-label="Facebook" style="display:flex; align-items:center; color:var(--z-light); opacity:.82; text-decoration:none"><svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.56 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.77-3.89 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99A10 10 0 0 0 22 12z"></path></svg></a>
      </div>
    </nav>
  </header>

  <!-- TITLE BAND -->
  <section style="position:relative; background-color:var(--z-red); background-image:url(assets/zsofi/grain.png); background-size:240px; padding:96px 44px 72px">
    <div style="max-width:var(--container); margin:0 auto">
      <p style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:var(--z-light); opacity:.7; margin:0 0 16px">Írj nekem</p>
      <h1 style="font-family:var(--font-mono); font-weight:600; font-size:clamp(34px,5vw,64px); letter-spacing:.03em; text-transform:uppercase; line-height:1; color:var(--z-light); margin:0">Kapcsolat</h1>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="z-contact" style="display:grid; grid-template-columns:1fr 1fr; gap:2px; align-items:stretch; background:var(--z-red-deep)">
    
    <div style="order:2; background-color:var(--z-paper); background-image:url(assets/zsofi/grain.png); background-size:220px; display:flex; flex-direction:column; justify-content:center; padding:56px 64px">
      <h2 style="font-family: var(--font-mono); font-weight: 600; font-size: clamp(24px,3vw,34px); letter-spacing: .03em; text-transform: uppercase; line-height: 1.12; color: var(--z-red); margin: 0 0 28px">Írj egy üzenetet</h2><form class="z-form" onSubmit="{{ noSubmit }}" style="display: flex; flex-direction: column; gap: 22px; width: 100%">
        <input type="email" placeholder="E-mail cím" aria-label="E-mail" style="background:transparent; border:none; border-bottom:2px solid rgba(42,35,32,.3); color:var(--z-ink); font-family:var(--font-mono); font-size:15px; letter-spacing:.04em; padding:12px 4px; outline:none">
        <input type="text" placeholder="Név" aria-label="Név" style="background:transparent; border:none; border-bottom:2px solid rgba(42,35,32,.3); color:var(--z-ink); font-family:var(--font-mono); font-size:15px; letter-spacing:.04em; padding:12px 4px; outline:none">
        <textarea placeholder="Írd ide az üzeneted…" aria-label="Üzenet" rows="3" style="background:transparent; border:none; border-bottom:2px solid rgba(42,35,32,.3); color:var(--z-ink); font-family:var(--font-serif); font-size:16px; line-height:1.5; padding:12px 4px; outline:none; resize:none"></textarea>
        <button class="z-btn-solid" type="submit" style="align-self:flex-start; font-family:var(--font-mono); font-weight:600; font-size:14px; letter-spacing:.12em; text-transform:uppercase; color:var(--z-light); background:var(--z-red); border:none; padding:15px 30px; cursor:pointer; transition:background var(--dur) var(--ease)">Elküldöm →</button>
      </form>
      
    </div><div style="order:1; position: relative; background-color: var(--z-slate); background-image: url(assets/zsofi/grain.png); background-size: 240px; display: flex; flex-direction: column; justify-content: center; padding: 56px 64px; overflow: hidden">
      <div style="position:absolute; inset:0; background-image:url(assets/zsofi/grain.png); background-size:220px; opacity:.28; pointer-events:none"></div>
      <div style="position:relative; z-index:1">
        <p style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.28em; text-transform:uppercase; color:var(--z-light); opacity:.72; margin:0 0 24px">Elérhetőség</p>
        <a class="z-link" href="mailto:hello@mozeszsofi.hu" style="display:block; font-family:var(--font-mono); font-size:18px; letter-spacing:.04em; color:var(--z-light); text-decoration:none; opacity:.9; margin-bottom:26px; transition:opacity var(--dur) var(--ease)">hello@mozeszsofi.hu</a>
        <p style="font-family:var(--font-serif); font-size:17px; line-height:1.7; color:var(--z-light); opacity:.9; margin:0 0 26px; max-width:340px">Felolvasás, közös projekt, műhely vagy csak egy gondolat — minden levélnek örülök. Néhány napon belül válaszolok.</p>
        <div style="display:flex; gap:24px">
          <a class="z-link" href="https://www.instagram.com/mozeszsofi/" target="_blank" rel="noopener" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--z-light); text-decoration:none; opacity:.85; transition:opacity var(--dur) var(--ease)">Instagram</a>
          <a class="z-link" href="https://www.facebook.com/mozeszsofi/" target="_blank" rel="noopener" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--z-light); text-decoration:none; opacity:.85; transition:opacity var(--dur) var(--ease)">Facebook</a>
        </div>
      </div>
    </div>
  </section>

  

  <dc-import name="Footer" hint-size="100%,320px"></dc-import>
</div></x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 760 },
  &quot;colorRed&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;options&quot;: [&quot;#7A1416&quot;, &quot;#AD4B34&quot;, &quot;#355061&quot;, &quot;#49616F&quot;], &quot;default&quot;: &quot;#7A1416&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Színek&quot; },
  &quot;colorTerra&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;options&quot;: [&quot;#AD4B34&quot;, &quot;#7A1416&quot;, &quot;#B5652B&quot;, &quot;#355061&quot;], &quot;default&quot;: &quot;#AD4B34&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Színek&quot; },
  &quot;colorNavy&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;options&quot;: [&quot;#355061&quot;, &quot;#49616F&quot;, &quot;#2E3A44&quot;, &quot;#7A1416&quot;], &quot;default&quot;: &quot;#355061&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Színek&quot; },
  &quot;colorSlate&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;options&quot;: [&quot;#49616F&quot;, &quot;#355061&quot;, &quot;#5A6E5A&quot;, &quot;#AD4B34&quot;], &quot;default&quot;: &quot;#49616F&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Színek&quot; },
  &quot;colorPaper&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;options&quot;: [&quot;#E2DDD1&quot;, &quot;#EDE7DB&quot;, &quot;#D5CFC0&quot;, &quot;#DED4C0&quot;], &quot;default&quot;: &quot;#E2DDD1&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Színek&quot; }
}">
class Component extends DCLogic {
  constructor(props) { super(props); this.rootRef = React.createRef(); }
  palette() {
    return {
      red: this.props.colorRed || "#7A1416",
      terra: this.props.colorTerra || "#AD4B34",
      navy: this.props.colorNavy || "#355061",
      slate: this.props.colorSlate || "#49616F",
      paper: this.props.colorPaper || "#E2DDD1",
    };
  }
  applyVars() {
    const el = this.rootRef.current; if (!el) return;
    const p = this.palette();
    el.style.setProperty("--z-red", p.red);
    el.style.setProperty("--z-terra", p.terra);
    el.style.setProperty("--z-navy", p.navy);
    el.style.setProperty("--z-slate", p.slate);
    el.style.setProperty("--z-paper", p.paper);
    el.style.setProperty("--z-hero", p.red);
  }
  componentDidMount() { this.applyVars(); }
  componentDidUpdate() { this.applyVars(); }
  renderVals() { return { rootRef: this.rootRef, noSubmit: (e) => e.preventDefault() }; }
}
</script>
</body>
</html>
