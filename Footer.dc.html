<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="styles.css">
<style>
  .z-foot a{transition:opacity var(--dur) var(--ease)}
  .z-foot a:hover{opacity:1!important}
  @media(max-width:820px){ .z-footgrid{grid-template-columns:1fr 1fr!important} }
</style>
</helmet>
<footer class="z-foot" style="position:relative; overflow:hidden; background:#1C0A0B; color:var(--z-light); padding:56px 44px 32px">
  <div style="position:absolute; inset:0; background-image:url(assets/zsofi/grain.png); background-size:260px; opacity:.14; pointer-events:none"></div>
  <div style="position:relative; z-index:1; max-width:var(--container); margin:0 auto">
    <div class="z-footgrid" style="display:grid; grid-template-columns:1.6fr repeat(3,1fr); gap:40px; padding-bottom:36px; border-bottom:1px solid rgba(237,231,219,.18)">
      <div>
        <div style="font-family:var(--font-mono); font-weight:600; text-transform:uppercase; letter-spacing:.16em; font-size:20px; line-height:1.2">Mózes Zsófi</div>
        <p style="font-family:var(--font-serif); font-size:16px; line-height:1.6; max-width:300px; margin-top:14px; opacity:.82">Írok a törésvonalakról – és arról, ami utána következik: szabadulás, megérkezés, levegő.</p>
      </div>
      <div>
        <h4 style="font-family:var(--font-mono); font-weight:600; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--z-terra); margin:0 0 14px">Oldalak</h4>
        <a href="rolam.dc.html" style="display:block; font-family:var(--font-mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; color:var(--z-light); padding:6px 0; opacity:.8">Rólam</a>
        <a href="szovegek.dc.html" style="display:block; font-family:var(--font-mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; color:var(--z-light); padding:6px 0; opacity:.8">Szövegek</a>
        <a href="kurzusok.dc.html" style="display:block; font-family:var(--font-mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; color:var(--z-light); padding:6px 0; opacity:.8">Kurzusok</a>
      </div>
      <div>
        <h4 style="font-family:var(--font-mono); font-weight:600; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--z-terra); margin:0 0 14px">Kapcsolat</h4>
        <a href="hirlevel.dc.html" style="display:block; font-family:var(--font-mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; color:var(--z-light); padding:6px 0; opacity:.8">Hírlevél</a>
        <a href="kapcsolat.dc.html" style="display:block; font-family:var(--font-mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; color:var(--z-light); padding:6px 0; opacity:.8">Írj nekem</a>
      </div>
      <div>
        <h4 style="font-family:var(--font-mono); font-weight:600; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--z-terra); margin:0 0 14px">Kövess</h4>
        <a href="https://www.instagram.com/mozeszsofi/" target="_blank" rel="noopener" style="display:block; font-family:var(--font-mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; color:var(--z-light); padding:6px 0; opacity:.8">Instagram</a>
        <a href="https://www.facebook.com/mozeszsofi/" target="_blank" rel="noopener" style="display:block; font-family:var(--font-mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; color:var(--z-light); padding:6px 0; opacity:.8">Facebook</a>
      </div>
    </div>
    <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; padding-top:20px; font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; opacity:.6">
      <span>© 2026 Mózes Zsófi</span>
      <span>Minden jog fenntartva</span>
    </div>
  </div>
</footer>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 320 }
}"></script>
</body>
</html>
