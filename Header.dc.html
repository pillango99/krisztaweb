<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="styles.css">
<style>
  .z-navlink{transition:opacity var(--dur) var(--ease)}
  .z-navlink:hover{opacity:1!important}
  .z-navlink[aria-current]{opacity:1!important;border-bottom:2px solid currentColor;padding-bottom:3px}
  @media(max-width:820px){ .z-navlinks{gap:16px!important} .z-navlink{font-size:11px!important;letter-spacing:.1em!important} }
</style>
</helmet>
<header style="position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; gap:20px; padding:20px 44px; background-color:var(--z-red); background-image:url(assets/zsofi/grain.png); background-size:220px; border-bottom:2px solid var(--z-red-deep)">
  <a href="web_zsófi.dc.html" style="font-family:var(--font-mono); font-weight:600; text-transform:uppercase; letter-spacing:.2em; font-size:15px; color:var(--z-light); text-decoration:none; white-space:nowrap">Mózes Zsófi</a>
  <nav class="z-navlinks" style="display:flex; align-items:center; gap:28px; flex-wrap:wrap; justify-content:flex-end">
    <a class="z-navlink" aria-current="{{ curRolam }}" href="rolam.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Rólam</a>
    <a class="z-navlink" aria-current="{{ curSzovegek }}" href="szovegek.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Szövegek</a>
    <a class="z-navlink" aria-current="{{ curKurzusok }}" href="kurzusok.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Kurzusok</a>
    <a class="z-navlink" aria-current="{{ curHirlevel }}" href="hirlevel.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Hírlevél</a>
    <a class="z-navlink" aria-current="{{ curKapcsolat }}" href="kapcsolat.dc.html" style="font-family:var(--font-mono); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--z-light); opacity:.82">Kapcsolat</a>
    <div style="display:flex; align-items:center; gap:16px; margin-left:8px">
      <a class="z-navlink" href="https://www.instagram.com/mozeszsofi/" target="_blank" rel="noopener" aria-label="Instagram" style="display:flex; align-items:center; color:var(--z-light); opacity:.82; text-decoration:none"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17.5" cy="6.5" r="1.3" fill="currentColor" stroke="none"></circle></svg></a>
      <a class="z-navlink" href="https://www.facebook.com/mozeszsofi/" target="_blank" rel="noopener" aria-label="Facebook" style="display:flex; align-items:center; color:var(--z-light); opacity:.82; text-decoration:none"><svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.56 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.77-3.89 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99A10 10 0 0 0 22 12z"></path></svg></a>
    </div>
  </nav>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 80 },
  &quot;active&quot;: { &quot;editor&quot;: null, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const a = this.props.active || "";
    const cur = (x) => (a === x ? "page" : undefined);
    return {
      curRolam: cur("rolam"),
      curSzovegek: cur("szovegek"),
      curKurzusok: cur("kurzusok"),
      curHirlevel: cur("hirlevel"),
      curKapcsolat: cur("kapcsolat"),
    };
  }
}
</script>
</body>
</html>
